services: 
  catalogue:
    build:
      dockerfile: catalogue.Dockerfile
    image: joindevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build:
      dockerfile: user.Dockerfile
    image: joindevops/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend:
    build:
      dockerfile: frontend.Dockerfile
    image: joindevops/frontend:1.0.0
    container_name: frontend
    depends_on:
    - catalogue
    - user
  mongodb:
    build: 
      dockerfile: mongodb.Dockerfile #it moves to mongodb directory.
    image: lokeshlh/mongodb:1.0.0  # docker build -t lokesh/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: false  # if true, we need to create network manually.