services: 
  catalogue:
    build:
      dockerfile: catalogue.Dockerfile
    image: lokeshlh/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb



  mongodb:
    build: 
      dockerfile: mongodb.Dockerfile #it moves to mongodb directory.
    image: lokeshlh/mongodb:1.0.0  # docker build -t lokesh/mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: true  # if true, we need to create network manually.